<!DOCTYPE html>
<html lang="en" xmlns:th="https://www.thymeleaf.org"
xmlns:sec="https://www.thymeleaf.org/thymeleaf-extras-springsecurity5">

<head th:replace="fragments/head :: frag_head(~{::title})">
<title>Barkpointment | Visits</title>
</head>

<body>
	<div sec:authorize="isAuthenticated()">
		<div sec:authorize="hasRole('ROLE_USER')">
			<header th:replace="fragments/header :: frag_header_user"></header>
		</div>

		<div sec:authorize="hasRole('ROLE_ADMIN')">
			<header th:replace="fragments/header :: frag_header_admin"></header>
		</div>
		
		User's name: <span sec:authentication="name"></span><br />
		Roles: <span sec:authentication="principal.authorities"></span><br />
	</div>
	
	<div th:replace="fragments/titleBar :: frag_titleBar('appointments')"></div>

	<footer th:replace="fragments/footer :: frag_footer_dark"></footer>
</body>
