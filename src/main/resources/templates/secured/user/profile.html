<!DOCTYPE html>
<html lang="en" xmlns:th="https://www.thymeleaf.org"
	xmlns:sec="https://www.thymeleaf.org/thymeleaf-extras-springsecurity5">

<head th:replace="fragments/head :: frag_head(~{::title})">
<title>Barkpointment | Profile</title>

<!-- <link rel="stylesheet" href="../../../static/css/bootstrap.css">
<link rel="stylesheet" href="../../../static/css/style.css"> -->
</head>

<body>
	<div sec:authorize="isAuthenticated()">
		<div sec:authorize="hasRole('ROLE_USER')">
			<header th:replace="fragments/header :: frag_header_user"></header>
		</div>

		<div sec:authorize="hasRole('ROLE_ADMIN')">
			<header th:replace="fragments/header :: frag_header_admin"></header>
		</div>

		User's name: <span sec:authentication="name"></span><br /> Roles: <span
			sec:authentication="principal.authorities"></span><br />
	</div>

	<div th:replace="fragments/titleBar :: frag_titleBar('profile')"></div>

	<div class="py-4 table-responsive-lg">

		<table class="table table-hover text-center">
			<thead>
				<tr>
					<th scope="col">ID</th>
					<th scope="col">Username</th>
					<th scope="col">Authority</th>
					<th scope="col">First Name</th>
					<th scope="col">Last Name</th>
					<th scope="col">Phone</th>
					<th scope="col">Email</th>
					<th scope="col">Address</th>
					<th scope="col">City</th>
					<th scope="col">Province</th>
				</tr>
			</thead>
			<tbody>
				<tr th:each="acct : ${acctList}">
					<td th:text="${acct.acctID}"></td>
					<td th:text="${acct.username}"></td>
					<td th:text="${acct.authority}"></td>
					<td th:text="${acct.fname}"></td>
					<td th:text="${acct.lname}"></td>
					<td th:text="${acct.phone}"></td>
					<td th:text="${acct.email}"></td>
					<td th:text="${acct.address}"></td>
					<td th:text="${acct.city}"></td>
					<td th:text="${acct.province}"></td>
				</tr>
			</tbody>
		</table>

	</div>

	<footer th:replace="fragments/footer :: frag_footer_dark"></footer>
</body>
