<!DOCTYPE html>
<html lang="en" xmlns:th="https://www.thymeleaf.org"> 

<head th:replace="fragments/head :: frag_head(~{::title})">
<title>Barkpointment | Register</title>
<!-- 	<link rel="stylesheet" href="../static/css/bootstrap.css">
	<link rel="stylesheet" href="../static/css/style.css">
 -->
</head>

<body>

	<header th:replace="fragments/header :: frag_header_logo"></header>

	<div class="full-height bg__cover bg__register">
		<!-- column 1-->
		<div class="p-5 w-50">
			<!-- sys message -->
			<div th:insert="fragments/sysAlert :: frag_sysAlert('already have account')"
				class="alert-danger" ></div>

			<!-- login card-->
			<form class="p-5 shadow bg-white text-secondary" action="#"
				method="post">
				<p class="form__title">Create your Account</p>
				<br />
				
				<div class="createAcct">
					<div class="flex-shrink-1">
						<div class="form-floating">
							<input type="text" class="form-control" id="fnameID"
								placeholder="John" required> <label for="fnameID">First
								Name</label>
						</div>
					</div>
					<div class="flex-shrink-1">
						<div class="form-floating">
							<input type="text" class="form-control" id="lnameID"
								placeholder="Doe" required> <label for="lnameID">Last
								Name</label>
						</div>
					</div>
					<div class="flex-shrink-1">
						<div class="form-floating">
							<input type="text" class="form-control" id="phoneID"
								placeholder="1234567" required> <label for="phoneID">Phone</label>
						</div>
					</div>
					<div class="flex-shrink-1">
						<div class="form-floating">
							<input type="email" class="form-control" id="emailID"
								placeholder="name@example.com" required> <label
								for="emailID">Email</label>
						</div>
					</div>
					<div class="flex-shrink-1">
						<div class="form-floating">
							<input type="password" class="form-control" id="passID"
								placeholder="Password" required> <label for="passID">Password</label>
						</div>
					</div>

					<div class="flex-shrink-1">
						<div class="form-floating">
							<input type="password" class="form-control" id="passID2"
								placeholder="Password" required> <label for="passID2">Retype
								password</label>
						</div>
					</div>

				</div>
				<!-- end of login-info -->
				<br />
				<button id="submit" type="submit"
					class="w-100 btn btn-lg btn-info text-white">Create</button>
				<hr />

				<div class="text-center">
					Have an account? <a href="#" th:href="@{/login}" class="link-info">Login</a>
					<br />
				</div>

			</form>
			<!-- end of form -->

		</div>
		<!--  end of column -->

	</div>
	<!-- end of container -->


	<footer th:insert="fragments/footer :: frag_footer_light"></footer>



</body>

</html>
