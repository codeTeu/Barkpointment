<!DOCTYPE html>
<html lang="en" xmlns:th="https://www.thymeleaf.org">

<head th:replace="fragments/head :: frag_head(~{::title})">
<title>Barkpointment | Login</title>
<!-- <link rel="stylesheet" href="../static/css/bootstrap.css">
	<link rel="stylesheet" href="../static/css/style.css"> -->

</head>

<body>

	<header th:replace="fragments/header :: frag_header_logo"></header>

	<div class="full-height bg__cover bg__login ">

		<!-- column 1-->
		<div class="p-5 d-md-inline-block">
			<!-- sys message -->
			<div id="sys-message" class="sys_message__base sys_message__alert">
				<span>System Message</span>
			</div>

			<!-- login card-->
			<form class="p-5 shadow bg-white text-secondary" action="#"
				method="post">
				<p class="form__title">Login Form</p>
				<br />
				<div id="login-info">
					<div class="form-floating">
						<input type="email" class="form-control" id="emailID" value="name@example.com"
							placeholder="name@example.com" required> <label
							for="email">Email</label>
					</div>

					<div class="form-floating">
						<input type="password" class="form-control" id="passID"
							placeholder="Password" value="000000" required> <label
							for="password">Password</label>
					</div>

					<div class="form-check">
						<input type="checkbox" id="remMeID" value="remember-me"
							class="form-check-input"> <label class="form-check-label"
							for="remember-me">Remember me</label> <br> <br>
					</div>

					<button id="submit" type="submit"
						class="w-100 btn btn-lg btn-info text-white">login</button>
				</div>
				<!-- end of login-info -->

				<hr />

				<div class="text-center">
					Don’t have an account? <a href="#" th:href="@{/register}"
						class="link-info">Create one</a> <br /> <a href="#"
						class="link-info">Forgot password</a>

				</div>

			</form>
			<!-- end of login form -->

		</div>
		<!--  end of column -->
	</div>
	<!-- end of container -->


	<footer th:insert="fragments/footer :: frag_footer_light"></footer>



</body>

</html>
